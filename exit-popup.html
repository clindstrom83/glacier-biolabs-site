  <!-- Exit Intent Popup -->
  <div id="exitPopup" class="exit-popup">
    <div class="exit-popup-content">
      <button class="exit-close" onclick="closeExitPopup()">✕</button>
      <div class="exit-icon">🚀</div>
      <h3>Wait! Don't Miss Out</h3>
      <p>Use code <strong>10OFF</strong> for 10% off your first order</p>
      <div class="exit-features">
        <span>🔬 Lab-Tested</span>
        <span>🚀 Ships in 24h</span>
        <span>📋 COA Included</span>
      </div>
      <a href="#products" class="btn" onclick="closeExitPopup()">Shop Now</a>
      <p class="exit-note">Valid for first-time customers only</p>
    </div>
  </div>

  <style>
    .exit-popup{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,.7);
      z-index:10000;
      justify-content:center;
      align-items:center;
    }
    .exit-popup.active{display:flex}
    .exit-popup-content{
      background:#fff;
      border-radius:16px;
      padding:40px;
      max-width:500px;
      text-align:center;
      position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .exit-close{
      position:absolute;
      top:16px;
      right:16px;
      background:transparent;
      border:none;
      font-size:24px;
      cursor:pointer;
      color:#999;
    }
    .exit-icon{font-size:48px;margin-bottom:16px}
    .exit-popup-content h3{font-size:28px;margin:0 0 12px;font-weight:800}
    .exit-popup-content p{font-size:16px;margin:0 0 20px;color:#666}
    .exit-popup-content p strong{color:var(--accent);font-size:24px}
    .exit-features{display:flex;gap:16px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
    .exit-features span{font-size:13px;padding:6px 12px;background:#f3f4f6;border-radius:6px}
    .exit-note{font-size:12px;color:#999;margin-top:16px}
  </style>

  <script>
    let exitPopupShown = false;
    document.addEventListener('mouseleave', function(e){
      if(e.clientY < 0 && !exitPopupShown && !localStorage.getItem('exitPopupSeen')){
        document.getElementById('exitPopup').classList.add('active');
        exitPopupShown = true;
        localStorage.setItem('exitPopupSeen', 'true');
      }
    });
    function closeExitPopup(){
      document.getElementById('exitPopup').classList.remove('active');
    }
  </script>
